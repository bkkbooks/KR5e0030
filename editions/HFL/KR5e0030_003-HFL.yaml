front:
  text: 道門經法相承次序卷下諸三三清境從下第一大赤天第二禹餘天第三清微天
  hash: sha256:b0f8b0b1dfa8d3afbd0f0a72d74632743e65a14812754fc5cfd8f9f88cd141d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0030_HFL_003-001a, image: hfl/0762/0762-086.png}
body:
  text: 右已上名無上三天皆是證果極地妙行真人分形應化神通自在湛然常住不壞之天分即爲九清凝然謂之一炁一炁外稱爲大羅天即是元始天尊不動之所度人經曰三界之上眇眇大羅上無色根雲層峨峨唯有元始浩劫之家即之謂常三元八節十直庚申諸是齋日十方上聖五億諸天妙行真人無鞅數衆並嚴天威法服各從十千萬人駕虚乘龍作天大樂嘯歌邕邕十絶靈旛飄流浮空而上大會玄都玄都大羅之天玉京山之上玄中大法師十號者與以前十號别一號無名之君二號無上玄老三號太上老君四號高上老子五號天皇大帝六號玄中法師七號有古先生八號金闕帝君九號虚無真人十號太上高皇右出真傳一曰大道二曰正真三曰太上四曰老君五曰玄老六曰天尊七曰十聖八曰真聖九曰玉帝十曰法王一乘謹按太真科經云三乘相通用有前後歎而駭之名曰一乘道也一念經云心得定也二景謂日月也二氣謂隂陽二真左玄真人右玄真人二儀圓天方地二篇經云爲說道德列以二篇謂道經上德經下二智經云權實救黎蒙二官謂上仙上靈三天一曰始氣化爲清微天二曰玄氣化爲禹餘天三曰元氣化爲大赤天三士上士得道昇爲仙官中士得道棲集崑崙下士得道長生世間又三士上士氣騰駕景乘虚中士隱化坐在立亡下士滅度轉輪聖王三精陽精爲日隂精爲月和精爲星三華玉清内左宫玉清右宫玉清中宫三籙一金籙上元主天天者乾爲天金籙主之故銷天灾也二黄籙下元主地地者坤坤包黄故黄籙主之濟拔七祖七祖恐在地府三玉籙中元主人人出籙者資於德玉備德玉備德故玉籙主王公三階有有無非有非無此形之三階有隂有陽有和此氣之三階有智有愚有庸此神識之三階也有利有鈍有平此才用之三階也凡十有五事同宗一氣也三世過去無極當來無極見在無極三自然利根之人學大自然守虚無變化生死爲世世宗師宗師者聖人也平根之人學中自然守神鍊形飛爲天官真人鈍根之人學小自然守隂陽氣生毛羽飛仙也三患一嫉妬二誹謗三貪欲三丹田眉間赤子神心下真人神臍下嬰兒神三道一聖道二真道三仙道又三道一無極大道二無上大道三無爲大道三元上元八中元八下元八三魂一名爽靈二名胎光三名幽精三毒與前三毒别一貪淫二嗔恚三愚癡三乘學行小乘學洞神得道成仙仙有九品第一上仙男皇女后二高仙男帝女后三大仙男王女妃四神仙男公女妃五玄仙男卿女夫人六真仙男大夫女夫人七天仙男士女妻八靈仙九至仙男士女妻中乘學洞玄得道成真真有九品一上真二高真三大真四神真五妙真六天真七仙真八靈真九至真大乘學洞真得道成真聖有九品一上聖二高聖三大聖四神聖五玄聖六仙聖七真聖八靈聖九至聖三皇天地人是三皇三象玄氣青元氣白始氣黄三願一願天清二願地寧三願人生三真第一鬱羅翹二光妙音三真定光三一真一正一太一三官亦謂三元上元天官治陽元之士中元地官治酆都山洞中下元水官治九江洞室中三山一閬風亦名蓬萊三瀛洲三方壺三灾一大旱二大病三大水三尸一上尸好寳貨二中尸好五味三下尸好色慾亦五色三要第一要當求生二要當求藏形三要當避世榮三吉凶一生年月二婚姻三家宅三會正月七日七月七日十月五日三惡一生蟲中二生鳥中三生獸中三劫一龍漢前劫二赤明中劫三開皇今劫四輦一男道士二男俗人三女女官四女俗人三等一貴人二士人三庶人四達一達過去無窮之事二達見在一切之事三達未來無量之事四達無邊聖衆境界之事四辯一法辯能夷就諸法二義辯通達諸義三心辯樂爲衆說四巧辯言利無有遺滯四施一救貧病二立觀宇三造經法四建齋講四等以前已有某一唯慈某二唯愛某三唯善某四唯忍五老一白元二無英三桃君四司命五太一主符籍五通眼通耳通鼻通舌通心通五持戒一行仁慈愛不殺拯生度死目能久視目通肝肝藏魂肝魂相安東方木二行義賞善罰惡不盜耳了玄音耳通肺肺藏魄肺魄相洽西方金三行禮敬老慈少不淫口盈法露心神相和南方火四行智化愚學聖斷酒損欲腎精相合北方水五行信守中不壞疑始終無忘脾志相成中央土出老子經戒五難一貧窮布施難二豪貴學道難三制命不死難四得見洞經難五生遇聖道難五逆一怨天地二穢辱日月星辰三呵風駡雨四爲臣不忠五爲子不孝順五道一天道二人道三地獄道四餓鬼道五畜生道五魔青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黄天魔王横天擔力五帝一青帝靈威仰二赤帝赤熛弩三黄帝含樞紐四白帝曜魄寳五黑帝隱候局五食中食過中不味蔬食唯菜而已麤食麥苣藤藥食服食衆藥氣食服氣咽液五濁一見濁邪見二劫濁日月短促三衆生濁精神不明四煩惱濁嗔恚鬥諍五命濁短壽五行一血屬水二骨屬木三肉屬土四齒爪屬金五氣煖屬火五蔭一色蔭眼見一切色二受蔭以覺是非三想蔭心思惟之四行蔭心隨想行事五識蔭心知生滅識想鑒記五真一天師張道陵二徐來勒三真定光四鬱羅翹五光妙音斷五根滅餐不思滋味滅香不思芳美滅衣勿貪細滑滅色目不看玄黄滅聲耳不聽絲竹五欲一眼欲五色二耳欲五聲三鼻欲五氣四舌欲五味五身欲五觸六覺眼覺色耳覺聲鼻覺香身覺觸舌覺味心覺想心一切覺六通一目通能徹視洞達坐見十方天上地下無有障蔽六合内外鬼神人物幽顯大小莫不了然分明如視掌中二耳通能洞聽天上天下四面八方一切音聲無不悉聞人天禽獸蝖飛蠢動一切衆聲聞悉曉了分明三鼻通曉百和寳香分辨氣數濃薄差失纖毫必記四方上下異域絶境香臭之氣聞如面前四舌通萬品衆物合爲一食經舌悉知種類分别其味五身通能飛行上下履火涉水經山觸石無所懾礙分形散體千變萬化形長充於八極短入於毫微六心通迴一切法皆悉空淨六行孝慈愛貞忠謙六空道至空隨事空非不空非是空非非空非非不空六洞天爲洞視地爲洞聽東爲洞空西爲洞虚南爲洞清北爲洞微六善三明四達五定六通三十二相八十一好六情一心主知喜怒二肝主知青赤三肺主知角徵四腎主知羶焦香腥朽五脾主知酸苦六膽主知柔弱操緫知滑剛强温潤亦爲六塵六家一甲寅木神主骸骨二甲辰風神主氣息三甲午火神主温煖四甲申金神主牙齒五甲戌土神主肌肉六甲子水神主血液六天一赤虚天二玄都天三清浩天四泰玄都天五泰蒼天六泰清天七魄一名尸狗二名伏矢三名雀隂四名吞賤五名非毒六名除穢七名臭腴七部經正一部三卷太平部四卷太清部三十六卷洞玄部五十一卷洞真部一百五十一卷太玄部一百三十五卷洞神部七覺北斗七星是也七曜日月東大明南熒惑西太白北辰中央鎮星八難一生得免三惡道爲人難二得爲人去女爲男難三旣得爲男六根具足難四六根旣具足得生中國難五生中國遇值有道國君難六值有道師尊難七善心旣發尋得道長生難八旣信道德值三光齊朗三寳不絶難八節齋立春春分立夏夏至立秋秋分立冬冬至此日各有直官陽九之厄百六之會四千五百歲爲一元一元之中九厄陽五隂四陽爲火旱隂爲水澇太極九名亦名仙府九宫一太清二太極三太微四紫房五玄臺六帝堂七天府八皇宫九天原其域同一四等因一者因善知識而得悟理二者因至心聽而得悟理三者因念念思惟而得悟理四者因如法修行而得悟理四威儀一行二住三坐四卧念念不滅是四功德四无一者未出未生名之爲无如樹藏芽未造木種二者已滅已絶名之爲无如一切物等破壞磨滅三者失對无四不可獨有名之爲无如失假偶四者如不有物畢竟空无如龜毛免角四有一者已生已出名之爲有如子孫萬物等是有二者植諸果實存種生苗如子實相續是有三者如經中六句三等義二並俱有示不可无四者如虚凝常道清淨湛然一相无爲是有真慧得知過去未來見在若聖若凡若因若果天地劫數成壞淨穢了了悉知謂之慧得三自然前已有不同一體自然虚凝真常是二應自然和氣昇降是三受自然青黄赤白黑是二十八宿東方角亢氐房心尾箕南方井鬼柳星張翼軫西方奎婁胃昴畢觜參北方斗牛女虚危室壁五星東方歲星南方熒惑西方太白北方辰星中央鎮星六齋月正月三月五月七月九月十一月上三天令天帝太一日月星宿三官考召司察天下罪過以上白三天考召之若能修此歲中六齋之法令除十苦八難得免厄伐拜謁太上三尸去可得長生不老天師教諸男女官爲道當修月中十直月一日北斗下八日北斗司命殺鬼下十四日太一使者下十五日天帝下十八日天一下二十三日太一八神使者下二十四日北辰下二十八日下太一下二十九日中太一下月三十日上太一自下十五日天帝下者日月星宿其中諸官森然俱下三十日上太一自下者日月五星二十八宿璇璣玉衡七星北斗司命司録司殺司罰大聖尊神妙行真人天帝真王其中諸天及鬼神森然俱下當此之日天神地祇莫不傾悚周行天下伺人善惡其日若有執心精進不違經教弘宣道法益人壽算度録左契文免患難名上三天尅名玉録拜爲真人八節日仙官會已前有不同立春日太極真人會諸仙真刻玉簡記仙名春分日太素真人會諸仙官於崑崙瑶臺校定真經立夏日五帝會諸神仙於紫微宫見四真人論求道者之功罪夏至之日天上三官會於司何侯校定萬人罪福增年減算立秋之日五嶽真人會謁黄老君於黄房雲庭之山集仙官定神圖靈藥秋分之日上皇太帝君登上清集衆真萬仙會于寥陽之殿共議定天下萬人罪福記學道求仙之懃懈疏犯過日月修行善惡刑罰之科根源修例副之司命書于黄籙立冬之日陽臺真人會諸仙人定新得道始入名仙録冬至之日衆仙詣方諸東海青童君刻定衆仙籍金書内字甲子日支干端數六旬歸宗天人合紀四時加慶庚申之日金威肅殺岱府秉刑魄精紏過尸鬼奏惡生由此源應當檢遏邪津開顯正道月建之日隂陽改度百神受事建德惟新並解除先譴進修後善月晦之日隂精毁損躔次數周幽府搜簡司官定律月望之日圓魄充滿陽光合映照拂㝠愆散蕩幽咎察往照來機動必接甲寅日並是魂魄躁競之辰十直之日諸天上帝妙行真人並詣玄都玉京朝謁虚皇大道君簡校人鬼生死罪録善惡殊分五物亦謂五行一血天水二骨天木三肉天土四齒天金五氣天火五盟謂五教不篤結約而盟之七詛謂違於仁義禮智信引道天神地祇人鬼日月星血盟三壽一上品百二十二中品百歲三下品八十歲三命一曰罰命行不善天所亡謂慢易天地輕侮神靈伐於山川傷殘賢良天府所亡二曰疾命邪慾多病所生謂飲食無量房内無度衆邪所疾天數不遂也三曰度命衆命之數紀物之終謂人禀於神神留於精精盡老朽殂落六入聲入耳色入眼香入鼻物入身味入舌事入心外來謂入六情前已有不同一耳聽宫商角徵羽二眼視青黄赤白黑三鼻知臊燋香臭腥腐四身知寒温剛柔滑五舌知酸苦甘辛醎六心知善惡喜怒哀樂外來曰塵内動曰情六度一能進勤二能守雌三能施終四能忍辱五能戒信六能棄酒色八行一能受非不自申二能讓德於人三能不欲人之欲四能容無理不訴五能無遠道身藏幽處六能不自違心七能不負經戒八能不代口所誦四德一志向定矣二秉操堅矣三勤心至矣四守情篤矣五毒一水漂溺之苦二火憤灼之苦三五賊五兵之苦四病狂厲之苦五害玃摶齒蹋觸螫之毒九府天官中府左府右府地府中府左府右府水官中府左府中府三寳亦謂三尊道寳經寳真人寳三竒一大洞真經二雌一五老經三太丹隱書經仙府九宫一曰太清二太極三太微四紫房五玄臺六帝堂七天府八皇宫九玉京玄都神丹九品一曰太和自然龍胎之醴二玉胎瓊液之膏三飛丹紫華流精四珠光雪碧之腴五九泉紅華神丹六太清金液之華七九轉霜雪之丹八九鼎雲英九雲光水石流霞上三天太赤天禹餘天清微天故治六天下上第一赤虚天第二泰玄都第三皓天第四泰玄天第五太玄蒼天第六太清天元始九天第一鬱單無量天去第二天二十四萬里第二上上禪善無量壽天去第三天四千六萬里第三梵監須延天去第四天六百七十二萬里第四寂然兜術天去第五天一千二百四十萬里第五不驕樂天去第六天三千六百八十萬里第六化應聲天去第七天五千三百八十四萬里第七梵寳天去第八天五百二十萬里第八梵摩迦夷天去第九天六百八十萬里第九波梨答惒天去下五百億二十萬里玄都八方東大堂鄉納善世南宛利城棄賢世西福堂州北鬱單野清淨世東南無福田用賢世西南延福鄉仁靜世西北福德鄉延賢世東北福集鄉長安世崑崙九土東信土陽州南波土迎州西坼土拾州北成土玄州中面土冀州東北咸土威州東南農土神州西南陷土成州西北肥土柱州天地九元上元之上九九八十一萬歲上元之中八八六十四萬歲上元之下七七四十九萬歲中元之上六六三十六萬歲中元之中五五二十五萬歲中元之下四四十六萬歲下元之上三三九萬歲下元之中二二四萬歲下元之下一一二萬歲右三元合二百八十六萬歲是時天尊在賈奕天上七寳紫微宫中與七千億衆講論妙法時彼衆中有一真人名海空智藏長跪稽首請問玄門衆生發心入道階級昇降三清十轉名號爾時天尊告海空智藏汝等當知十方大聖初進道三階十轉次第階梯汝今審聽十轉以前三階進趣何等爲三階以前不同一者信階二者行階三者迴向階信膈之中有十心何等爲十一者信心二進心三念心四慧心五定心六戒心七迴向心八護法心九捨法心十願心行階之中有十行信進念慧定戒迴向護法捨法願心等是十行迴向階中有十迴向信心進心念心慧心定心戒心迴向心護法心捨法心願心等是十迴向三階發心進趣入道方便依憑勝心進入十轉與已前十轉全别一者證實轉二離障轉三光明對治轉四智火燒然轉五權魔勝轉六現前顯德轉七遠行光惠轉八相無相不動轉九定慧相應轉十法地究竟轉海空智藏此中十轉乃是過去未來見在三世天尊異時同說爲歎對治道心真人十種障一者對治衆生障二對治衆生邪行障三於聞思修習受忍不通障四自六解發心起高慢障五自知諸法我慢衆人障六除十轉已前煩惱習障七除細法智障八斷無明有障九斷不善利佗障十者於法示得自在障海空智藏真人爲欲斷除入道真人十種障故現行滅盡令種不生故立十轉何故物名證實乃至地究竟轉者爲欲利益智汝漸明進入物轉十轉義者第一爲證見道性真實妙理故名證實轉第二爲得淨妙戒具足清淨妙戒具足清淨離煩惱吝障故名離障轉第三爲隨聞無漏善法思量修習照明顯現故名光明對治轉第四爲煩惱成薪智火燒燼故名智火燒然轉第五爲得出世間無漏聖智善行方便離諸煩惱捨有漏心降伏衆魔故名摧魔勝轉第六爲入深智慧到於彼岸自佗俱利智德現前故名現前顯德轉第七爲修無相法功力究竟譬如人行去我漸遠故名遠行光慧轉第八爲果德純熟於無相行中無閭闕故名不動轉第九爲無礙慧心向衆生說法成就中利佗故名定慧相應轉第十爲得法身具足衆德圓滿畢竟自在故名法地究竟轉以是大士受法王位猶如太子於諸王中而得自在仍此位十轉仍有微細障猶未解脫對治此微細習障故未得證入天尊地於此地中事已究竟具足衆德圓備道性智性平等無二五大三德十法具足成就三身法報應等願行利益衆德圓備十法具足何等爲十一者辭無明父母二别生死眷屬三入重玄門四歷事十方天尊五與其伴類相識六同坐解脫床七究竟常樂八攝受門徒九授布三乘教法十三德圓備何者爲三德一者證道智德二煩惱德三悲多恩德財用自在三身備具法身報身應身道門經法相承次序卷下
