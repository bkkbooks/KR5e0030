body:
  text: 道門經法相承次序卷上諸一原夫道家由肇起自無先垂跡應感生乎妙一從乎妙一分爲三元又從三元變成三氣又從三氣變生三才三才旣立萬物斯備其三元者第一混洞太無元第二赤混太無元第三㝠寂玄通元從混洞太無元化生天寳君從赤混大無元化生靈寳君從㝠寂玄通元化生神寳君大洞迹别出爲化主治在三清境其三清境者玉清上清太清是也亦名三天其三天者清微天禹餘天大赤天是也天寳君治在玉清境即清微天也其氣青始靈寳君治在上清境即禹餘天也其氣白元神寳君治在太清境即大赤天也其氣黄玄故九天生神章經云此三號年殊號異本同一也此三君各爲教主即是三洞之尊神也其三洞者謂洞真洞玄洞神是也天寳君說十二部經爲洞真教主靈寳君說十二部經爲洞玄教主神寳君說十二部經爲洞神教主三洞合成三十六部尊經第一洞真爲大乘第二洞玄爲中乘第三洞神爲小乘從三洞緫成七部者洞真洞玄洞神太玄太平太清爲輔經太玄輔洞真太平輔洞玄太清輔洞神三輔合成三十六部正一盟威通貫緫成七部故曰三洞尊文七部玄教又從七部汎開三十六部其三十六部者第一本文第二神符第三玉訣第四靈圖第五譜録第六誡律第七威儀第八方法第九衆述第十傳記第十一讚誦第十二表奏三洞各有十二部三洞合成三十六部其三氣者玄元始三炁是也始氣青在清微天元氣白在禹餘天玄氣黄在大赤天故云玄元始三氣也又從玄元始變生隂陽和又從隂陽和變生天地人故老經云道生一一生二二生三三生萬物自玄都玉京已下合有三十六天二十八天是三界内八天是三界外其三界者慾界色界無色界從下六天爲慾界次十八天爲色界次四天爲無色界三界合二十八天其三界勝境身相端嚴從慾界天已上人壽命長遠皆以黄金爲地白玉爲階珠玉珍寳自然而有雖復雅樂並不免生死其次三界上四天名爲種人天亦名聖弟子天亦名四梵天此人斷生死三灾之所不能及其次即至三境境别左右中三宫宫别有仙王仙公仙卿仙伯仙大夫别有一太上一老君天師太清境有九仙上清境有九真玉清境有九聖三九二十七位也其九仙者第一上仙二高仙三大仙四玄仙五天仙六真仙七神仙八靈仙九至仙真聖二境其號次第亦以上高大玄天真神靈至爲次但真云仙真元真真聖云仙聖無天聖最上一天名曰大羅天在玄都玉京山上紫微金闕七寳騫樹騏驎師子化生其中三世天尊治在其内慾界二十八天其次四天次三境最上大羅合三十六天緫是天尊所統故經云三界之上渺渺大羅上無色根雲層峨峨唯有元始浩劫之家三代天尊者過去元始天尊現在太上玉皇天尊未來金闕玉晨天尊然太上即是元始天尊弟子從上皇半劫已來元始天尊禪位三代天尊亦有十號第一自然二元極三大道四至真五太上六道君七高皇八天尊九玉帝十陛下尋道家經詰起自三元從本降迹成於五德以三就五乃成八會其八會之字妙氣所成八角垂芒凝空雲篆太真按筆玉妃拂筵黄金爲書白玉爲簡祕於諸天之上藏於七寳玄臺有道即現無道即隱蓋是自然天書非關蒼頡所作今傳靈寳經者則是天真皇人於峨嵋山受於軒轅黄帝又天真皇人受帝嚳於牧德之臺夏禹感降於鍾山闔閭竊闚於句曲其後有葛孝先之類鄭思遠之徒師資相承纏聯不絶其老子道德經乃是大乘部攝正當三輔之經未入三洞之教今人學多浮淺唯誦道德不識真經即謂道教起自莊周殊不知始乎柱下也眷言弱喪深可哀哉蠡酌管闚一至於此何者老君生於殷末長自周初託神玄妙玉女處胎八十一載逍遥李樹之下剖左腋而生生即皓然號曰老子指樹爲氏因姓李焉其相也美眉黄色日角月懸蹈五把十耳有三門鼻有雙柱周德既衰世道交喪平王三十三年十二月二十五日去周而度青牛薄輦紫氣浮關遂付道德真經於關令尹喜由此明道家經詰非唯五千元始天尊寳珠老子豈唯年代差異亦自位號不同若爲名三界一者欲界有六天即從度人經太黄皇曾天數滿六天是欲界人壽命萬歲人在世生不犯身業殺盜之罪來生即登此天此天之中無六欲染著故生此天二者色界有十八天即以次取之其中人壽億萬歲若人一生之中不犯心業貪嗔之罪得生此天三者無色界四天其中人壽命億劫歲若人一生之中不惡口兩舌妄言綺語當來過往得居此天其中善男子善女人功行滿足堪上四天者王母迎之登上四天其三界無上常融天太釋騰勝天龍變梵度天太極賈奕天此四天名四種人天即三界之上灾所不及四人天上有三清境第一太清第二上清第三玉清三清之上即是大羅天元始天尊居其中施化行教太清境大赤天神寳君說十二部經其經號曰洞神部其中一人爲仙主第二上清境是禹餘天靈寳君爲教主說十二部經其經號曰洞玄部其中一人爲真主第三玉清境清微天天寳君說十二部經其經號曰洞真部其中一人爲聖主所謂仙真聖也大赤天爲元氣其色白禹餘天爲玄氣其色黄清微天爲始氣其色蒼即行道登壇之時無上三天玄元始三氣是也何爲名四等一者唯慈二者唯愛三者唯善四者唯忍何爲名六度行一者勤二者信三者雌四者終五者諫諍六者斷酒色何爲名六根一耳根二眼根三鼻根四舌根五心根六身根根者外未有對内未有應宜謂之根何爲名六塵眼以貪色爲塵耳以躭聲爲塵鼻以香臭爲塵舌以察味爲塵身以細滑爲塵心以貪觸爲塵其六根過度即爲六塵濁失其正性又名六賊由人方便用之何爲名四大一者地大爲人骨肉二者水大爲人血肰三者火大爲人温煖四者風大爲人冷氣何爲名五蔭一者色蔭縁眼觀一切色名色蔭二受蔭心覺是非苦樂名受蔭三想蔭心思惟名想蔭四行蔭心隨想行爲名行蔭五識蔭心知生滅識想鑒記名識蔭何爲名三業一者身業有殺盜婬二心業有貪嗔癡三口業有惡口兩舌妄言綺語名爲三業身三意三口四即兼爲十惡五苦其五苦有生死二苦生有五苦死有五苦何爲名生五苦按昇玄經云一者身爲奴婢憂悲别離二長處愚盲不見妙道與師父隔三鰥寡孤獨有人之形無人之情四身遭横事牢獄纏縛五雖曰長壽疾病攻身煩惱終日是名生五苦何爲名死五苦一者履刀山劎樹手脚爛斷二入鑊湯沸湧之中骨肉俱爛生死輪迴三身遊餓鬼道中衣不充形食不滿腹吞火食炭四男抱銅柱女卧鐵床劎樹衝心刃鋒刺背五縱得受生還爲六畜任人鞭打破領穿蹄是名死五苦何名三塗塗者役也一者地獄道二餓鬼道三畜生道兼五苦即名八難何名三業以前已有一者身業二者心業三者口業就身業之中復有三過一者殺生過二偷盜過三邪淫過言一切衆生迴手動足常行殺害一切蠢動含血之類不起慈心或乘闇夜行公然劫剥或經過觀舍取三寳物命過之後墮落三塗惡鳥啄睛鐵犂耕舌鎔銅萬沸灌口燒身累劫㝠㝠無由解脫以報前業之罪就心業之中亦懷三毒一者隂私毒二賊害毒三讒佞毒命過之後在五濁湯中晝夜煎煑縱得受生還爲毒蛇惡獸以報前身三毒之罪是名心業就口業之中復有四罪一者綺言二者妄語三者兩舌四者惡駡一切衆生在十方大地華辭綺豔翻覆兩舌說人長短離人種親粗言惡氣更相駡詈復以口業舌根貪諸滋味飲酒食肉及以葷辛命過之後當没九幽㝠㝠長夜之中切切寒冰之獄假使慈悲父母誰知苦爽含酸雖有恩愛妻兒豈見孤魂受痛唯有三天教主六道大師哀愍衆生猶如赤子惟慈惟愛普救衆生降福降恩援濟含識御慈悲之救物敬元始之洪恩各各率勵身心一時歛意罪無大小並乞消除障有淺深一朝懺盡一心稽首歸依信禮唐天皇於中嶽逍遥問三一法潘尊師答曰謹按皇人守一經存三守一之法先心思存兩眉間却入三寸爲上丹田之中一神名赤子字元先一名帝卿人長三寸赤幘赤衣赤履次思心中丹田之中一神名真人字子丹一名光堅赤幘赤衣赤履人長三寸次思臍下三寸爲下丹田之中一神名嬰兒字元陽子一名谷玄子赤幘赤衣赤履人長三寸思見下一坐金床玉机常以金鑪玉匕攪精氣訖思上一來下往在中一左面復思下一手持金鑪玉匕上在中一右面先以精哺上中一計令人得十三口便思上一還所住次思下一還所住訖便止真人曰子能守一萬事畢一者身之帝君也守帝則帝在帝在則三萬六千神皆莫敢不在也思之可以却百鬼衆精五兵水火衆灾五毒虎狼蛇蝮蛟龍魍魎山精鬼魅不得近人耳唐天皇問曰額上髮際九宫並是何宫尊師答曰謹按登真隱訣經其髪際以後九宫一名雙田宫一名明堂宫一名洞房宫一名丹田宫一名流珠宫一名玉帝宫一名天庭宫一名極真宫一名玄丹宫謹按登真隱訣其頭中兩眉間上都入三分爲守寸雙田却入一寸爲明堂宫却入二寸爲洞房宫却入三寸爲丹田宫却入四寸爲流珠宫却入五寸爲玉帝宫明堂上一寸爲天庭宫洞房上一寸爲極真宫丹田上一寸爲玄丹宫流珠宫上一寸爲太皇宫凡一頭中九宫也唐天皇問曰六合宫在何處尊師答曰謹按雙景經其六宫在眉後空處入皮一分仍辟方九分是唐天皇問曰道家階梯證果竟在何處天師答曰竊以法性常湛真理唯寂雖混成而有物而虚廓無眹機感所及㝠然已周因教立名厥義無量夫道者圓通之妙稱聖者玄覺之至名一切有形皆含道性然得道有多少通覺有淺深通俗而不通真未爲得道覺近而不覺遠非名聖人是以痛痒寒温蓋萬物之小覺轉九結網斯一藝之近通然爲道日疏去聖逾遠自非挺然玄悟超然大通焉能覺三界之沾危通四生於壽域斯蓋以通通覺令未覺者皆通以覺覺通使未通者皆覺所以成大覺於是號圓通然則唯法與人通本通迹色觀則非有應感則非無是以大道天尊有真有應真則湛然常住不滅不生應則有去有來權示接引然真應兩端身亦不一真身則爲道本應身則爲化迹化迹劫劫出見垂像流音說經度人不可稱數以無量大惠攝受群生一切衆生根性差别故設科立教漸頓有殊是諸行人初發道意起回向心如說修行先持淨戒所言戒者法有二種一者有得戒二者無得戒有得戒者即太玄真經所謂三戒五戒九戒十戒百八十戒三百大戒之例是也無得戒者即謂上機之人靈識惠解業行精微離諸有心不嬰塵染體入空界跡蹈真源不求常樂而衆善自臻不厭人間而諸惡自息本自無持今即不犯無犯是名無得旣其無得亦復無失無得故謂爲真上機之人其戒如此若能持戒不犯登十轉位得五道果言十轉位得五道果言十轉位按海空智藏經曰一者無憂轉二淨心轉三釋滯轉四道儒轉五達解轉六善見轉七權物轉八了機轉九天明轉十具足轉五道果者經曰果有五種一者地仙果二飛仙果三自在果四無漏果五無爲果若人修行服食休粮研精道味志慕山林隱形棲遁餐霞納氣弃於甘腴身輕體健免於老死遊心道本不食衆生行慈悲法或生處貴家所居華麗身無疾惱長齋蔬食捨離婬欲修如上法則獲地仙之果如人行諸善業守護戒行未嘗缺犯端身正心休粮絶穀善持六根不染垢污行業模準不越理度遊踐名嶽餐餌雲霞靜心堅固安然不動雖不廣覽大洞妙音而守持淨戒如瑠璃珠内外明徹脩如上術即獲飛仙之果如人善達禁戒種種威儀身心所行㝠合規矩天人崇仰莫不供養神力變化應見無方志意所之莫不必遂不餐藥餌自然飽滿若欲食者應念而至於此世間形慮自在遊行山澤得無懼心常修善業形隨感起心如山嶽習行神通思微定於思微中能分身形應赴無量通此術者則獲自在果如人於一切法照了通達於佗心行分别巨細無有差失利益無量入空有際經典悉皆受持無復煩惱貪嗔愛著悉皆捨離六入清淨三結永斷曉了照達辯才說法廣度衆生於一報内及至未來終不退轉漸漸階梯至無上道勤修此法則獲無漏道果無爲果者即是入寂無上法門寂境即是無爲無爲即是寂境寂境者不生不死故能長生不毁不變故能應變無爲即是有爲有爲即是無爲以無爲生有爲以有爲入無爲境即是感應感應即是寂境以菽境生感應以感應歸寂境微妙莫測神力難思窮極深幽故名解脫是無爲最上之果五果功成十轉行滿然後離三界縳昇出九清證太一道紹法王位惡根永斷衆德普會三達洞照五眼明徹非身離身亦不不身而以一形周遍六道非心離心亦不不心而以一念了一切法解衆生性即真道性一相無相以此爲無而獨能爲萬物之始以是義故故稱元始雖近遵一切道爲獨尊常處三清出諸天上八方五億諸天所尊故稱天尊尊義多名略開五稱所謂道德中尊智惠中尊神通中尊淨妙中尊功德巍巍讚詠難盡唐天皇問曰天尊名號有何階級尊師答曰謹按靈寳諸經及三界圖籙道有三清三界其三清境者則玉清上清太清三界者則欲界色界無色界其下欲界有六天其中色界有十八天其上無色界有四天三界之上復有四種人天合有三十二天從四人天已下三界之中猶未免於三灾劫壞從無色界已上則三灾所不及劫會所不干其三清境中各有一天則清微天禹餘天大赤天此三清三界各有諸天帝皇真仙品格僚屬極多非可具述又有大羅天彌覆三清之上合三清大羅三界等爲三十六天其大羅天中有玉京山山上有七寳城城周旋二十四萬里高二萬四千里城中有七寳玄臺九萬層臺出城上三百六十里臺上又生七寳之樹八株樹高臺上七百二十里其樹施枝布葉彌覆城上八方無極之外其樹以金銀爲根株珠玉爲枝柯珊瑚夜光爲樹葉𤥭𤦲瑪瑙瑠璃琥珀爲子實金銀珠玉交錯其間微風動條枝葉粲麗讚詠洞章玄煥曜目四靈邕邕宫殿樓觀難可稱焉諸天帝王大聖天尊妙行真人仙童玉女皆各奉功朝修洒掃燒香散花師子辟邪神龍朱鳳悉皆飛翔靈獸侍衛百千萬種此山出五色流泉又有九色光明徹照大羅衆天之上虚皇大道元始天尊之所都故度人經曰三界之上眇眇大羅上無色根雲層峨峨唯有元始浩劫之家即斯謂也常至三元八節諸是齋日十方上聖諸天帝皇妙行真人無鞅數衆並嚴天威羽服各從十千萬人駕雲乘龍作天大樂嘯歌邕邕十絶靈幡飄流浮空而上大會玄都朝宗玉京元始天尊衆聖皆燒香朝禮飛行步虚歌玄都之絶麗歎宫闕之竒名衆聖交觀非可名焉又衆篇經曰太上大道君高上玉帝十方至真並乘五色瓊輪琅輿碧輦九色玄龍十絶羽蓋三素流雲諸天大聖妙行真人皆乘碧霞九靈流景飛雲玉輿慶霄四會三晨吐芳飛香八凑流電激揚華精灌日三景合明神霞煥爛流盻太元從五帝神仙桑林千真師子白鵠虎豹龍麟靈妃散華金童揚煙五道開塗三界通津徘徊雲路嘯詠十天上詣三清大羅之上太玄玉都寒靈丹殿紫微上宫建天寳羽服詣元始天尊金闕之下請受元始靈寳赤書玉篇真文天尊挺生神狀以道爲身非假因縁而有待藉故無量經曰元始祖劫化生諸天開明三景是爲天根上無復祖唯道爲身應化濟物顯號無窮攝迹歸真則湛而爲一以其諸天敬奉號曰天尊爲萬有之根故稱元始諸真者謹按道經初從凡學受持法戒行無缺犯則名係仙録得入五嶽靈山洞宫之中從洞宫中進學無替位登慾界諸天從慾界天中進道無替位登色界諸天從色界諸天進道無替位登無色界諸天從無色界諸天進道無替位登四種人天從四種人天進道無替位登無上三天從無上三天進道無替位登最上大羅之天從無色界以下三界天中若不進修無上大道則年劫有近遠三灾所及未免劫中之期從四種人天已上即是至道極果畢竟不壞仙宫與道同真常湛極樂唐天皇問曰太上道君已下何名人潘尊師答曰真途窈㝠絶諸色象應迹森列廣現無邊故有三清三界之殊九地九天之别諸天宫館各有方所或大或細不可勝言今則按無量度人經有三十二天三十二帝所居宫館各在其天道門經法相承次序卷上
