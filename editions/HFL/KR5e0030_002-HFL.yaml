  text: 道門經法相承次序卷中諸二
  hash: sha256:02ece20ac1be2279d3745143852391cccf32ab350f63fb0a73c74901b5bacb97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0030_HFL_002-001a, image: hfl/0762/0762-038.png}
body:
  text: 洞真及登真訣云太明宫玉霄琳房玉晨宫協晨宫七靈臺鳳臺瓊閣晨華闕太和殿寥陽殿紫珠闥七映房長樓右玉晨道君所居丹靈白玉宫瓊闕右太素三元君所居真陽宫右玉皇君之所居處太老寢堂右八皇老時入此堂會方宫右九老仙皇君所居散華臺右二十七皇道君治其上瑶臺瓊闕中藏金玄羽章萬神隱文右高上玉帝藏其真經之所七映紫臺中藏步躡天綱空常内名龍山臺秀玄臺大暉殿右地皇上真所遊處三華房右陽安元君之所居玉清宫右高上玉帝元始天王太真之館紫瑶宫丹瓊府右北玄高上虚皇君所居網靈宫化生府右南朱高上虚皇君所居光音宫八坦府右西華高上虚皇君所居紫微宫朱霍府右東明高上虚皇君所居金靈宫鳳嘯府右中元中舍虚皇君所居鳳生宫洞光府右五靈七明混生高上君所居明範宫輝華府右三元無上玄老靈皇元辰君所居七瑶宫北元府右玄寂無上虚皇君所居鬱森宫八瓊府右大明靈暉中真無上君所居靈霧宫霄上府右三元四極玄上元靈君所居洞霄宫演真府右三元晨中黄景虚皇元臺君所居返香宫夙滯府右三元紫映暉神虚生真元胎君所居瓊容宫太丹府右青精上真内景君所居瓊光宫通靈府右太陽九氣玉賢元君所居已上宫臺館府並在玉清妙境寒靈丹殿右元始天王下教命五老仙都出玉佩金璫寳經以傳高聖玉晨大道君所居廣靈堂右太素三元君所居晨燈臺右元始天王刻書紫微宫飛天檢文於其上金牖臺右元始天王刻書玄空飛天中書三元玉檢文於其上三元玄臺右歷萬八千劫則三天九靈上徹隱文一現於其上明真宫靈暉府右太初九素金華景元君所居紫曜宫七寳府右九皇上真司命君所居通妙宫定微府右天皇上真玉華三元君所居天皇宫玉靈府右太一上元禁君所居金華宫紫生府右元虚皇房真晨君所居四明宫八朗府右太極四真人元君所居華晨宫魁元府右四計中真士晨散華君所居七靈宫機玄府右辰中皇景元君所居金闕宫玉真府右後聖太平李真天帝上景君所居無量宫玄闕府右太虚後聖元景彭室真君所居太玄宫玉堂府右太玄都九氣丈人主仙君所居清虚宫洞清府右上清八景老君所居清元宫暘谷府右扶桑大帝九老仙皇君所居金靈宫通氣府右小有王真華先生主圖王君所居司空宫仙都府右玄州二十七真相伯上帝司禁君所居寳素宫九玄府右龜山九靈真仙母所居常陽宫九生府右上始少陽青帝君所居洞陽宫朱陵府右通陽納隂赤帝君所居金門宫通光府右少隂西金白帝君所居廣靈宫北黄府右通隂太陽黑帝君所居黄元宫高皇府右緫靈高皇帝君所居已上道君宫殿雜寳玄堂在上清妙境洞玄經曰太素宫右太素道君所居太和宫右太和大道君所居金華樓右仙真玉録皆在樓中已前寳樓綺宫在太清妙境極樂之所唐天皇問曰天尊有幾身爲弟子已不能苦道上啓天尊覆護弟子天師對曰可名非名故證理於絶言之境大象無象故昇玄於無物之間若唯恍惚杳㝠衆生可無瞻仰所以垂象立號令含識各有歸依無始以來劫數乆遠聖人應號亦復無邊雖不緫備經文實亦紀之萬一即事可顯者千五百天尊名别録隨進按諸經所明天尊有法身本身道身真身迹身應身分身化身謹按太上開演秘宻藏經曰太上言此經名爲開演秘宻之藏義如我等比無上法王出此五濁化諸衆生三業示現方便善巧意趣微隱難可了知所以示者十方天尊所得妙身即真道相體自然無形無名非造非作法如虚空相無數劫來乆證此法同一性平等無二而能出現種種法身示修習報應化無方人天惡道隨類所見受生業行皆同其法或現殊勝超踰世間第一希有獨步無畏威變自在不可思議是名開演身秘宻藏能於正道真實之性天尊無說寂滅相中善巧因縁分别顯示隨其所宜說法無盡言辭次第義味深賾或說三乘入天業果漸漸開化使得同歸真一正道是名開演口秘宻藏雖無念慮離分别想以一切智洞達空門正觀窮理邊底與真實相平等爲一以一切智照人間法色法非法心法非心法人天五道四大六塵衆生想念果報因縁於一念中明了無碍善識根性隨宜所行洞達究意是名開演心秘宻藏以是三種秘宻之法成真道身非是凡夫了至九星所能覺知法身天尊者謹按昇玄經曰吾以三氣周環八極或號元始或號老君或號太上或爲帝師或爲玄宗出幽入㝠待應無方隨人所好爲作法身同歸之趣非爲縁異愚者不體相與𡜍賢吾愍口過敢陳其源道之布氣在於無邊無形無像留住經文不自巧飾誠惟修身其身得真旣得真像自然登晨此法玄妙玄之又玄愚者失趣或謂非神相與競笑攻本伐根按太上洞極最勝無等道集經曰爾時十方天尊來到此土依域而住各於殿内而說讚曰元始無上第一尊超踰十方無等倫無數劫來積妙行具足清淨福惠因煩惱結習皆已斷畢竟故業不造新神通威力無所畏洞達三界了悟真圓備智慧諸功德集此妙法以爲身本身天尊者謹按寳玄經云太上曰本寂應動真假有殊權實衆妙同出玄門又按太上開演秘宻藏經曰帝君曰如是本身能生萬物即是萬物之本始者此與神本有何差别太上答曰源其實體無有二相何以故俱畢竟故無始終故不可言說故以善方便亦得言異所謂神本是妄想物一念想續衆生業果輪轉無窮是名識物亦名神本言本身者即是道性清淨之心能爲一切出萬法之根本故名爲本始是真性非心不心非色不色無縁慮故非無常故故言非心能生心故無不知故亦名爲心無所碍故故名非色能生色故道眼見故亦名爲色是清淨心具足一切無量功德智慧成就常住自在湛然安樂但爲煩惱所覆蔽故未得了故名爲性若修方便斷諸煩惱障法盡故顯現了故名爲本身如此身者本自有之非今造故故名爲本非有性非三代攝方便說故故非三代本來有故名爲過去一切衆生畢定當得故名未來十方大聖今已得故故名見在雖復說有三代差别體不動故常住無變道身天尊者謹按太上靈寳無量度人經云元始祖劫化生諸天開明三景是爲天根上無復祖唯道爲身又按太上開演秘宻藏經曰太上大道君與無量天真妙行真人俱詣太微天帝君處明霞之上瓊闕之内金華之房太微帝君稽首道君不審三代十方天尊所得妙身以何爲法爲同一體爲各異耶太上告曰至真妙理寂絶無形清淨凝湛不可言名方便引化略開二途一者道身寂體虚無二者生身誕孕形軀言道身者離一切相正慧成滿斷除虚妄㝠契玄宗與道爲一不滅不生無來無去談論路斷念慮長畢帝君禮曰不審道身即是寂本唯更有義名爲本耶太上告曰道爲聖本本是道根雖是一體非無二源道名獨立體自虚通强字無待遠逝息功本對於末因待假名稱爲物始用涉能生又爲迹本動寂用殊出没物表語嘿相須於是道君欲顯玄理重說偈曰道身不生滅任理自玄通湛然常清淨獨立强言空絶名不待對亦妄造物功端靜息義用肅菽守虚沖真身天尊者按仙公請問經曰得道之尊並由積德行善論身鍊神故致成真又太上决疑經曰元始天尊時在協晨靈觀稜層之臺與太上大道君及十二億童真上聖俱坐白玉師子之座俱宣祕要開闡妙門自非天尊同業共行入道界人不豫斯會復以神力震動大地周迴旋轉驚駭物心當爾之時三惡衆生皆得休假人天之報各蒙增益無諸苦惱障難之厄莫不一時遠近俱集其衆無量不可勝言是時大衆咸同一心瞻仰道君目不暫眴而說偈曰元始無上天人師今捨大慈離生死獨反善寂妙一源不住世間濟塵滓真智淳淨無碍身譬喻言辭莫能擬非是我等所知見何能觀之悟玄理迹身天尊者謹按太上開演秘宻藏經曰帝君又問生身迹身是應作耶太上答曰如是如是生之與迹並稱機縁利益不差即名爲應體用不别隨義異名帝君又問是迹身者爲有法耶爲無法耶太上答曰我不說耶一切諸法性無所有云何迹身而當有法若假名字亦有亦無不離本故故名爲無衆生見故故名爲有更無别體故名爲無有實利益故名爲有猶如明鏡能現色像了了分明種種差别是鏡中像不可定說是有是無而亦得言鏡中有像一切衆生心鏡明故見真道像又如止水無濤波故影見日月星辰飛鳥悉見水底一切諸物亦見自影了了分明此水中物及所見影俱非真實不可言有不可言無一切衆生心水清澄見道身影亦復如是體印真道是故非有非不見故不得言無如追逝者尋迹然得是迹與人非一非異迹身亦爾明解之人因迹入悟見真道身知無迹法故名爲一非不因迹漸得曉達能立福田是名爲異如是之義是道境界非是凡夫下聖能了於是道君欲顯斯義重說偈言權迹無定方現身亦長久逼示五道形姿容順妍醜任本之所重利益無憂負乍有變化生時或因父母應身天尊者謹按老君經教云聖真無鞅大要有二一者道精神氣降應成形形以同人人未還本二者凡夫積學功行備充神與應合隱而無名道應隨縁縁本無名出應有號出號異應號異道同動不離寂又按太上决疑經云元始天尊曰爲衆生故現應受身遊入五道稱縁開度隨宜方便皆使悟入稱物根性權示色像故名應身而此應身亦無生滅去來常住不變爲利一切隱顯不同發起精進令無退轉是時衆仙轉拜道君而說偈曰無上淨妙真智身寂滅無相莫能覩但見應體還本源是故各懷大憂苦仰賴太上無極尊猶如失母依慈父我等没在憂火中惟願時霔甘露雨斷絶倒想戀著心消除諸見滅邪趣分身天尊者謹按靈書度命經曰天尊分形百萬處處同時是男是女普見天尊在五色光中如俱一地隨所在處長幼男女皆往稽首天尊隨其國土說演十部妙經授以禁誡宣示男女是時四方邊境男女長幼莫示福心各賫金銀五色紋繒珠玉珍寳無鞅億數來送天尊伏受法誡尊承妙經七日七夜光明朗除四方復常諸國寳信滿一國中天尊一時布賜窮困饑者飽足貧者不乏貧富齊等人無怨心上天校録先有善功名書金簡皆得度世飛行太空始入法門普皆長壽三萬六千年又按太上洞極最勝無等道集經曰元始天尊三日三夜安然不動諸根寂滅入甚深定洞觀妙門一切大衆皆亦端拱瞻仰尊顔無一差跌過三日已元始天尊舉身含笑遍體放光純黄金色普照大衆發微妙音讚道君曰善哉善哉我之真子能紹尊位教化衆生啓方便門與我無異十方天尊皆悉隨喜元始天尊化作百億黄金之殿高下莊嚴法坐綺飾齊等如前十方國土皆在殿内分身天尊十方界見此光明一時來集相貌徒衆說法軌儀稱歎道君化身天尊者定志經曰時有十二年少處世閭樂日日相就共作飲食嬉戲遊觀或復議論爲道之難易天尊以道眼遥見人前生在世得爲人而秘吝經典故弟子相道之心亦復猶預因此徹縁縁猶可度於是天尊即化作凡夫從會中過訐乞食因共語化人曰持戒甚易違此難耳諸人聞化人言皆各僉然問化人曰云何先生持戒云易不持極難化人曰立身如戒不畏天子不畏鬼神何爲不易如違戒者是人悉畏復畏鬼神云何不難於是十二年少並有道意因各各自忖了達法縁太上决疑經云元始天尊語徐來勒曰吾以道眼遥於寂地觀察衆生有能分别賜子法印依教行者我即化身種種示現人天六道隨宜施作儵有欻無權示接引覆護輔持今無留難卿當以此正法之印普教天人咸使知識按法奉行太極真人稽首奉命唐天皇問曰道法在此天中爲極爲當更有所在潘尊師答曰謹按登真隱訣真靈位業經云玉清紫虚高上元皇道君洞虚三元太明上皇道君虚明紫蘭中元高上崞皇道君太素高虚上極紫皇道君右玉清上元景四道君北玄高上虚皇道君南朱高上虚皇道君西華高上虚皇道君東明高上虚皇道君中元上合虚皇道君五靈七明混生高上道君右玉清中元紫清六道君三元無上玄老靈皇元晨君三元四極上元虚皇元靈君三元晨中黄景虚皇元臺君三元紫映輝神虚生真元胎君玉玄皇道君上皇道君右玉清下元高清六元君高上道君玉皇道君玉玄道君玄清玉皇上皇天帝太上虚皇道君上皇高真太上王君三天太一元君右玉清諸道君出上清經並業崇重但心相入寂不復應化於下界也上清高聖太上玉晨玄皇大道君右太上大道君爲上清已下萬道化主見八素經上紫微太素高虚洞曜三元道君紫晨微天帝道君紫明太山九道高元玉晨道君右上清道君主訓教學真之人太虚飛晨中央黄老道君金闕帝晨後聖玄元上道君太元丹林太帝上道君後聖太師太微左真保皇道君上清紫清太素三元君道君上清上元太素元君道君上清中元紫素元君道君上清下元黄素元君道君上清紫晨天帝道君上清太微天高道君上清紫明太微九道高玄玉晨道君上清太虚上霄飛晨中央黄老道君上清紫元太微素三元道君玄清洞元青帝玉司道君玄清洞元赤帝玉司道君玄清洞元白帝玉司道君玄清洞元黑帝玉司道君玄清洞元黄帝玉司道君玄清紫元虚皇龜臺九靈太真元君玄清太元東霞扶桑丹林太帝道君玄清太平金闕帝晨聖玄元上道君洞清九太虚後聖元影彭室上真道君洞清八景靈都玄老君道君洞清九微太真玉寳上相青童道君洞清太玄都九炁丈人主仙道君洞清玉真華先生國玉道君洞清玄洲二十九真伯上帝司禁道君洞清太元晨君列峨嵋洞宫玉道君洞清後聖九靈真子上道君洞清太平仙綜司玉道君清微三天長生玄谷幽真道君清微安陽玄虚先生道君清微萬石玄遊先生道君清微上元三氣度命道君清微南宫定仙司録道君清微安昌緫仙度厄道君清微玄理煉魂上禁真皇道君清微生神化骨保仙道君清微玄虚萬石先生道君太清紫元三氣法師長生道君太清中宫青真小童道君八素經曰玉清宫之下真人乃上清宫之上真人太清宫之上真人乃上清宫之下真人諸仙受行太上真道三品盡備者爲玉清道君真君諸仙受行上品經備者爲上清真人中品備及三品皆有而各不備者並爲中道真人下品備及中下皆有而不備者並爲下元真人諸仙受行中品經不備者爲太清真人諸仙受行下品經不備者爲九宫真人諸仙受行太極經者爲五嶽名山地真人諸仙受行太清經者爲五嶽名山地真人仙有九品真有九品聖有九品合二十七品列之如左一至仙二靈仙三玄仙四飛仙五真仙六神仙七大仙八高仙九上仙真聖品一準至靈玄飛真人大高上而數右件真仙聖品位足學地從人學仙仙學真真學聖聖學道道學無極大道仙未及真真未及聖聖未及道道未及無上正真無極大道唐天皇問曰道家經皆是六十甲子靈官爲首起自星官天師對曰按紫館明真地仙洞訣經曰日月五星二十八宿北斗九星並有宫殿門户其中有神靈帝皇后之列尊卑階級緫御風雨統攝萬靈照煌照煌並臨下土一切衆生名籍仰隸人民善惡等業衆靈申奏上曹善功者升名黄籙罪責者書之黑簿功滿三千遷名仙格初學之人修善立功皆因隂陽六甲之正神蒙削除罪録紀名仙籍爲此靈官並是有爲曹部不能小有差違若被遺志則致年劫之曉是故勤求啓請庶早成功此是學之初門非大乘之高趣又初從凡學猶爲諸魔所障是以上憑日月星官下取六甲正氣將以攝御鬼神辟除妖魔筌蹄初學極果不然受法門徒各依階級從漸入頓自下之高故三乘教法小大不等謹按太真科曰盟威爲下科太清爲中科上清道德爲上科三科爲三乘下機之人先求自利未能度人故三皇洞神陶鍊智慧自近之遠以明身爲萬善之本濟己可以及物中機之人智慧明了濟物爲利己之由濟身爲度人之本故中品洞玄辯有通無物我兼濟若到洞真混合真假物我兩遺空有一貫是以中下之人初始學道立功樹德皆憑隂陽六甲日月五星一擬度身二擬濟物或救疾療病拔死度生雖是有爲功德福力大多從此熏修漸漸增進功成不處行滿不居常行隂惠爲而不恃自與道合終會無爲唐天皇問曰道法在此天中爲極唯當更有所在尊師對曰謹按靈寳本元經及太真科諸天靈書度命經並曰三界三清四種大羅之别其三界合有二十八天次上有四種人天次上有無上三天次上有一大羅高蓋天太黄皇曾天太明玉完天清明何童天玄胎平育天元明文舉天七耀摩夷天右六天欲界隂陽胎生年積萬歲虚無越衡天太極濛翳天赤明和陽天玄明恭華天曜明宗飄天竺落皇笳天虚明堂耀天觀明端靖天玄明恭慶天太煥極瑶天元載孔昇天太安皇崖天顯定極風天始皇孝芒天太皇翁重天無思江由天上揲阮樂天無極曇誓天右十八天色界隂陽有色與欲界同不相交接人皆化生年積億歲不殘不傷也皓庭霄度天淵通元洞天翰寵妙成天秀樂禁上天右四天無色界隂陽有形身長數百里不以爲累能隱形入微無復色欲唯直相知積年萬劫雖不事學而能行善福報所果至於魔王學未極亦遊此天不得越三界未免洪灾大運交周二十八天一時混沌猶如霧縠其中學真堪爲種人者聖母迎之登常融玉隆梵度賈奕四天之上其學聖真仙在三界者退還人道經歷三塗能越進者當依功轉無上常融天玉隆騰勝天龍變梵度天太極平育賈奕天右四種人天名四梵天壽命無有大期唯有念念變易日就増明不論壽盡而終越此天已下及三界壽命遠近並於中増修仁淨於習氣都盡即生其中道門經法相承次序卷中
